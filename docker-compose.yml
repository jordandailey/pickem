version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: pickem
      POSTGRES_USER: pickem
      POSTGRES_PASSWORD: pickem_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://pickem:pickem_pass@db:5432/pickem
      JWT_SECRET: CHANGE_THIS_BEFORE_LAUNCH_use_a_long_random_string
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: "*"
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
